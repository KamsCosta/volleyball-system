<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Volleyball System</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <div class="page">
    <div class="bg login"></div>
    <div class="overlay"></div>

    <div class="card">
      <div class="tabs">
        <button type="button" class="tab active">Login</button>
        <a href="./sign.html" class="tab">Sign Up</a>
      </div>

      <h2 class="form-title">Welcome Back</h2>
      <p class="form-subtitle">Login to access your volleyball dashboard</p>

      <form id="formLogin" class="form">
        <div class="input-row">
          <div class="input-icon">📧</div>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="E-mail"
            required
          />
        </div>

        <div class="input-row">
          <div class="input-icon">🔒</div>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="links">
          <a href="#">Forgot your password?</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
